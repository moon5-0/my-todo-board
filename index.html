<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>待办事项看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header__left">
      <svg class="header__logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="9" rx="1" />
        <rect x="14" y="3" width="7" height="5" rx="1" />
        <rect x="14" y="12" width="7" height="9" rx="1" />
        <rect x="3" y="16" width="7" height="5" rx="1" />
      </svg>
      <h1 class="header__title">待办事项看板</h1>
    </div>
    <div class="header__right">
      <button class="btn btn-primary" id="btn-add-task-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        添加任务
      </button>
      <button class="btn-theme" id="btn-theme" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          style="display:none">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Board -->
  <main class="board" id="board">
    <!-- Lists will be rendered here -->
  </main>

  <!-- Global Task Input -->
  <div class="task-input-wrapper" id="global-task-input"
    style="position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-header); border-top: 1px solid var(--border-color); z-index: 50;">
    <div style="max-width: 1200px; margin: 0 auto;">
      <div class="task-input__actions"
        style="padding: var(--spacing-md); display: flex; flex-direction: column; gap: var(--spacing-sm);">
        <input type="text" class="task-input" id="global-task-title" placeholder="输入任务标题..." maxlength="100">
        <div style="display: flex; gap: var(--spacing-sm);">
          <select class="task-list-select" id="global-task-list" style="flex: 1;">
            <option value="list-backlog">待办</option>
            <option value="list-progress">进行中</option>
            <option value="list-done">已完成</option>
          </select>
          <button class="btn btn-primary btn-add" id="global-btn-add">添加</button>
          <button class="btn btn-ghost btn-cancel" id="global-btn-cancel">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <h3 class="modal__title">确认删除</h3>
      <p class="modal__message">确定要删除这个任务吗？此操作无法撤销。</p>
      <div class="modal__actions">
        <button class="btn btn-ghost" id="modal-btn-cancel">取消</button>
        <button class="btn btn-danger" id="modal-btn-confirm">删除</button>
      </div>
    </div>
  </div>

  <script src="scripts/icons.js"></script>
  <script src="scripts/utils.js"></script>
  <script src="scripts/store.js"></script>
  <script src="scripts/kanban.js"></script>
  <script src="scripts/app.js"></script>
</body>

</html>
